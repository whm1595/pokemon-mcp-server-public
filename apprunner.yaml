version: 1.0
runtime: python311

build:
  commands:
    build:
      - echo "build step"

run:
  runtime-version: 3.11
  pre-run:
    - pip3 install -r requirements.txt
  command: python3 server.py
  network:
    port: 8000
  secrets:
    - name: POKEMON_TCG_API_KEY
      value-from: "SECRET MANAGER ARN"
